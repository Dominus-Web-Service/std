name: ci
run-name: "[CI] ${{ github.head_ref || github.ref_name }} by ${{ github.actor }}"

on:
  pull_request:
    branches: ["*"]
  workflow_dispatch:

jobs:
  # ─── Build all packages (respects dependency order) ─
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun Project
        uses: ./.github/actions/setup-bun-project

      - name: Build
        run: bun run build

  # ─── Lint & Test in parallel (after build gate) ─────
  check:
    name: ${{ matrix.name }}
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        include:
          - name: Lint
            script: lint:github
          - name: Test
            script: test
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun Project
        uses: ./.github/actions/setup-bun-project

      - name: Build
        run: bun run build

      - name: ${{ matrix.name }}
        run: bun run ${{ matrix.script }}
